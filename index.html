<!DOCTYPE html>
<html>
<head>
    <title>Tshaka M Academy</title>
</head>
<body>
    <div id="loginOverlay">
        <h1>Tshaka M Academy</h1>
        <button id="googleBtn" onclick="loginWithGoogle()">Sign in with Google</button>
        <button id="demoBtn" onclick="enterDemo()">Enter Demo</button>
        <div id="errorMsg"></div>
    </div>
    <div id="appContainer" style="display:none;">
        <h2>Welcome to Tshaka M Academy</h2>
        <p id="userDisplay">Demo User</p>
        <button onclick="logout()">Logout</button>
        <div>
            <h3>Chat</h3>
            <input type="text" id="chatInput" placeholder="Ask a question...">
            <button onclick="sendChat()">Send</button>
            <div id="chatOutput"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script>
        // ===== FIREBASE =====
        var firebaseConfig = {
            apiKey: "AIzaSyD5OB59lG6bAsmQ7A97zXP_MfQ5AM3BYaw",
            authDomain: "mindflow-ai-education.firebaseapp.com",
            projectId: "mindflow-ai-education",
            storageBucket: "mindflow-ai-education.firebasestorage.app",
            messagingSenderId: "157615197603",
            appId: "1:157615197603:web:540d67781fc55d04c11e16"
        };
        firebase.initializeApp(firebaseConfig);
        var auth = firebase.auth();
        var provider = new firebase.auth.GoogleAuthProvider();
        
        // ===== DOM =====
        var loginOverlay = document.getElementById('loginOverlay');
        var appContainer = document.getElementById('appContainer');
        var userDisplay = document.getElementById('userDisplay');
        var errorMsg = document.getElementById('errorMsg');
        var chatOutput = document.getElementById('chatOutput');
        
        // ===== STATE =====
        var isDemo = false;
        
        // ===== DEMO LOGIN =====
        window.enterDemo = function() {
            console.log('DEMO CLICKED');
            isDemo = true;
            userDisplay.textContent = 'Demo User';
            loginOverlay.style.display = 'none';
            appContainer.style.display = 'block';
            errorMsg.textContent = '';
        };
        
        // ===== GOOGLE LOGIN =====
        window.loginWithGoogle = function() {
            console.log('GOOGLE CLICKED');
            errorMsg.textContent = '⏳ Signing in...';
            auth.signInWithPopup(provider)
                .then(function(result) {
                    var user = result.user;
                    console.log('Google success:', user.email);
                    userDisplay.textContent = user.email;
                    loginOverlay.style.display = 'none';
                    appContainer.style.display = 'block';
                    errorMsg.textContent = '';
                })
                .catch(function(error) {
                    console.error('Google error:', error);
                    errorMsg.textContent = '❌ ' + error.message;
                });
        };
        
        // ===== LOGOUT =====
        window.logout = function() {
            if (!isDemo) auth.signOut();
            isDemo = false;
            loginOverlay.style.display = 'block';
            appContainer.style.display = 'none';
        };
        
        // ===== CHAT =====
        window.sendChat = function() {
            var input = document.getElementById('chatInput');
            var message = input.value.trim();
            if (!message) return;
            input.value = '';
            chatOutput.innerHTML += '<p><strong>You:</strong> ' + message + '</p>';
            
            fetch('https://tshaka-m-academy-backend.onrender.com/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, grade: '10', subject: 'General' })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                chatOutput.innerHTML += '<p><strong>Khensani:</strong> ' + (data.reply || 'No response') + '</p>';
            })
            .catch(function(e) {
                chatOutput.innerHTML += '<p><strong>Error:</strong> ' + e.message + '</p>';
            });
        };
        
        // ===== AUTH LISTENER =====
        auth.onAuthStateChanged(function(user) {
            if (user && !isDemo) {
                userDisplay.textContent = user.email;
                loginOverlay.style.display = 'none';
                appContainer.style.display = 'block';
                errorMsg.textContent = '';
            }
        });
        
        console.log('✅ Minimal Tshaka M Academy loaded.');
        console.log('   Click Demo or Google — both should work.');
    </script>
</body>
</html>
